<!DOCTYPE html>
<html>
<head>
  <title>Hotel Menu</title>

  <!-- Mobile responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f5f5f5;
    }

    h1 {
      margin: 0;
      padding: 15px;
      background-color: #333;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    img {
      width: 100%;        /* Full width on mobile */
      max-width: 700px;   /* Limit size on desktop */
      height: auto;       /* Maintain aspect ratio */
      display: block;
      margin: 10px auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

  <h1>Our Menu</h1>

  <!-- Your images -->
  <img src="image1.jpg">
  <img src="MENU page1.jpg">
  <img src="MENU page 2.jpg">
  <img src="MENU page 3.jpg">
  <img src="MENU page 4.jpg">
  <img src="MENU page 5.jpg">
  <img src="MENU Page 6.jpg">

</body>
</html>
